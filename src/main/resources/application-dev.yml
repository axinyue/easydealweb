spring:
  application:
    name: easydeal
  web:
    resources:
      static-locations: classpath:/web/
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/easy_deal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      pool-name: EasyDealHikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    baseline-version: 0
server:
  port: 8080

app:
  security:
    allowed-origins:
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
      - "http://localhost:8080"
      - "http://127.0.0.1:8080"
    allowed-hosts:
      - "localhost"
      - "127.0.0.1"
    cookie-secure: false
